---
- name: Install docker
  hosts: inception_nodes
  tasks:
    - name: Set Docker architecture
      set_fact:
        docker_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}"
    - name: Add dependencies
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
        update-cache: yes
      loop:
        - ca-certificates
        - curl
        - gnupg
    - name: Add docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
    - name: Add Docker repository
      apt_repository:
        repo: deb [arch={{ docker_arch }}]  https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present
        update-cache: yes
    - name: Add dependencies
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
        update-cache: yes
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
    - name: Create docker group
      group:
        name: docker
        state: present

- name: Set-up inception
  hosts: inception_nodes
  tasks:
    - name: Create inception user
      ansible.builtin.user: 
        name: inception
        comment: This user runs the inception stack
        group: docker
    - name: Copy inception sources
      ansible.builtin.copy: # change built in
        src: "{{ playbook_dir }}/Inception"
        dest: /home/user/inception/
        mode: '0755'
        owner: inception
        group: inception
        recurse: yes
