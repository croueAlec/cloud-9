---
# tasks file for docker_install

- name: Remove dependencies
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
    update-cache: yes
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin

- name: Set Docker architecture
  set_fact:
    docker_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}"

- name: Add dependencies
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update-cache: yes
  loop:
    - ca-certificates
    - curl
    - gnupg

- name: Add docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
- name: Add Docker repository
  apt_repository:
    repo: deb [arch={{ docker_arch }}]  https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    update-cache: yes

- name: Add dependencies
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update-cache: yes
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin

- name: Create docker group
  group:
    name: docker
    state: present
